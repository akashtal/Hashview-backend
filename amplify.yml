version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing dependencies..."
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "Backend build - no compilation needed"
    postBuild:
      commands:
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
      - '!node_modules/**/*'
      - '!coverage/**/*'
      - '!logs/**/*'
      - '!.git/**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
